name: Personal Release (Windows)

# Triggers on every push to feat/release or manually from the GitHub Actions UI.
# Version format: <main-3-part-version>.<MY_VERSION>  e.g. 0.0.20.001
on:
  push:
    branches:
      - feat/release
  workflow_dispatch:

permissions:
  contents: write  # needed to create GitHub Releases and tags

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # PREFLIGHT — compose the personal version string
  # ─────────────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight — Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      release_name: ${{ steps.version.outputs.release_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compose personal version
        id: version
        run: |
          # Strip any personal suffix that may already be in package.json
          # (e.g. "0.0.20.02" → "0.0.20") and append MY_VERSION.
          BASE=$(node -p "require('./apps/desktop/package.json').version.split('.').slice(0,3).join('.')")
          MY=$(cat MY_VERSION | tr -d '[:space:]')

          if [[ -z "$MY" ]]; then
            echo "MY_VERSION file is empty. Please set a 3-digit build number (e.g. 001)." >&2
            exit 1
          fi

          VERSION="${BASE}.${MY}"
          TAG="personal-v${VERSION}"

          echo "version=${VERSION}"      >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"              >> "$GITHUB_OUTPUT"
          echo "release_name=Personal Build v${VERSION}" >> "$GITHUB_OUTPUT"

          echo "Personal release version : ${VERSION}"
          echo "Git tag                  : ${TAG}"

  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD — Windows x64
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Windows x64
    needs: preflight
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build desktop artifact
        shell: bash
        run: |
          # Windows build — unsigned. build-desktop-artifact.ts sets
          # signAndEditExecutable: false automatically when --signed is absent.
          bun run dist:desktop:artifact -- \
            --platform win \
            --target   nsis \
            --arch     x64 \
            --build-version "${{ needs.preflight.outputs.version }}" \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish

          shopt -s nullglob
          for pattern in \
            "release/*.exe" \
            "release/*.blockmap" \
            "release/*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-win-x64
          path: release-publish/*
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # RELEASE — publish GitHub Release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [preflight, build]
    # Only run when the build job succeeded.
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: ${{ needs.preflight.outputs.release_name }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
          fail_on_unmatched_files: true
